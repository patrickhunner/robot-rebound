services:
  - type: web
    name: robot-rebound
    runtime: node
    plan: free
    buildCommand: corepack pnpm install --frozen-lockfile && corepack pnpm build
    startCommand: corepack pnpm start
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: VITE_DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: DISCORD_BOT_TOKEN
        sync: false
